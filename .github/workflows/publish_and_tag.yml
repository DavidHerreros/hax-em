# Workflow to send master to pypi and tag  the branch:
# You need to edit FOLDER_WITH_VERSION with the folder that has the __version__ value.

name: master to pypi with comments and tag


# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the main branch
on:
  push:
    branches: [ main ]

env:
  WORKING_DIR: Hax
  PACKAGE_DIR: hax
  
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  deploy:

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
    - uses: actions/checkout@v2

    - name: Set up MPI
      uses: mpi4py/setup-mpi@v1

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Extract version without installing
      run: |
        VERSION=$(python -c "import re; f=open('${{ env.FOLDER_WITH_VERSION }}/__init__.py'); print(re.search(r'__version__\s*=\s*[\"\']([^\"\']+)[\"\']', f.read()).group(1))")
        echo "PACKAGE_VERSION=v$VERSION" >> $GITHUB_ENV

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: ${{ env.WORKING_DIR }}/dist/
        print-hash: true

    - name: Get version and tag
      run: |
        export PACKAGE_VERSION=$(python -c "import $FOLDER_WITH_VERSION; print('VERSION', 'v'+$FOLDER_WITH_VERSION.__version__)" | grep VERSION | sed "s/VERSION //g")
        git tag $PACKAGE_VERSION
        git push origin $PACKAGE_VERSION
